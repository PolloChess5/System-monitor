[Rainmeter]
Update=1000
BackgroundMode=2
SolidColor=0,0,0,120

[Metadata]
Name=System monitor
Author=PolloChess5 "goth girls enjoyer"
License=Creative Commons BY-NC-SA 4.0

[Variables]
FontName=Segoe UI
TextSize=10
RAMcolor=215,74,145,255
CPUcolor=255,137,244,255
DiskColor=99,237,168,255
BackgroundColor=10,10,15,120
BorderColor=255,50,50,150
PaddingX=15
PaddingY=10
GraphWidth=80
GraphHeight=20

; HWiNFO settings: set GPUTempIndex to the sensor index from HWiNFO's registry output
GPUTempIndex=1
HWiNFORegKey=SOFTWARE\HWiNFO64\VSB

; Sfondo trasparente
[meterBackground]
Meter=Shape
Shape=Rectangle 0,0,280,90,12 | Fill Color #BackgroundColor# | Stroke Color #BorderColor# | StrokeWidth 1
X=0
Y=0
UpdateDivider=-1

; === MISURE SISTEMA ===
[measureRAM]
Measure=PhysicalMemory
UpdateDivider=1

[measureCPU]
Measure=CPU
Processor=0

[measureGPUTemp]
Measure=Registry
RegHKey=HKEY_CURRENT_USER
RegKey=#HWiNFORegKey#
RegValue=ValueRaw#GPUTempIndex#
UpdateDivider=1

[measureGPUTempPercent]
Measure=Calc
Formula=measureGPUTemp/100
UpdateDivider=1
DynamicVariables=1

; === RAM SECTION ===
[meterRAMLabel]
Meter=String
FontFace=#FontName#
FontSize=#TextSize#
FontColor=255,255,255,200
Text=RAM:
X=#PaddingX#
Y=#PaddingY#
AntiAlias=1
UpdateDivider=-1

[meterRAMValue]
Meter=String
FontFace=#FontName#
FontSize=#TextSize#
FontColor=#RAMcolor#
Text=%1%
X=50
Y=#PaddingY#
MeasureName=measureRAM
Percentual=1
NumOfDecimals=0
AntiAlias=1
LeftMouseUpAction=[!Refresh "#CURRENTCONFIG#"]

[meterRAMGraph]
Meter=Line
MeasureName=measureRAM
X=100
Y=#PaddingY#
W=#GraphWidth#
H=#GraphHeight#
LineColor=#RAMcolor#
LineWidth=2
AntiAlias=1
Autoscale=0
GraphStart=Right

; === CPU SECTION ===
[meterCPULabel]
Meter=String
FontFace=#FontName#
FontSize=#TextSize#
FontColor=255,255,255,200
Text=CPU:
X=#PaddingX#
Y=([meterRAMLabel:Y]+25)
AntiAlias=1
UpdateDivider=-1

[meterCPUValue]
Meter=String
FontFace=#FontName#
FontSize=#TextSize#
FontColor=#CPUcolor#
Text=%1%
X=50
Y=([meterRAMValue:Y]+25)
MeasureName=measureCPU
Percentual=1
NumOfDecimals=0
AntiAlias=1
LeftMouseUpAction=[!Refresh "#CURRENTCONFIG#"]

[meterCPUGraph]
Meter=Line
MeasureName=measureCPU
X=100
Y=([meterRAMGraph:Y]+25)
W=#GraphWidth#
H=#GraphHeight#
LineColor=#CPUcolor#
LineWidth=2
AntiAlias=1
Autoscale=0
GraphStart=Right

; === GPU TEMPERATURE SECTION ===
[meterGPULabel]
Meter=String
FontFace=#FontName#
FontSize=#TextSize#
FontColor=255,255,255,200
Text=GPU:
X=#PaddingX#
Y=([meterCPULabel:Y]+25)
AntiAlias=1
UpdateDivider=-1

[meterGPUValue]
Meter=String
FontFace=#FontName#
FontSize=#TextSize#
FontColor=#DiskColor#
Text=%1[\x00B0]C
X=50
Y=([meterCPUValue:Y]+25)
MeasureName=measureGPUTemp
NumOfDecimals=0
AntiAlias=1
LeftMouseUpAction=[!Refresh "#CURRENTCONFIG#"]

[meterGPUGraph]
Meter=Line
MeasureName=measureGPUTempPercent
X=100
Y=([meterCPUGraph:Y]+25)
W=#GraphWidth#
H=#GraphHeight#
LineColor=#DiskColor#
LineWidth=2
AntiAlias=1
Autoscale=0
MaxValue=1
MinValue=0
GraphStart=Right

; === BORDI GRAFICI (opzionale) ===
[meterRAMGraphBorder]
Meter=Image
X=100
Y=([meterRAMGraph:Y]-1)
W=([meterRAMGraph:W]+2)
H=([meterRAMGraph:H]+2)
SolidColor=255,255,255,30
UpdateDivider=-1

[meterCPUGraphBorder]
Meter=Image
X=100
Y=([meterCPUGraph:Y]-1)
W=([meterCPUGraph:W]+2)
H=([meterCPUGraph:H]+2)
SolidColor=255,255,255,30
UpdateDivider=-1

[meterGPUGraphBorder]
Meter=Image
X=100
Y=([meterGPUGraph:Y]-1)
W=([meterGPUGraph:W]+2)
H=([meterGPUGraph:H]+2)
SolidColor=255,255,255,30
UpdateDivider=-1
